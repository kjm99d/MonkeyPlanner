version: 2
updates:
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      # Minor + patch go updates in a single PR — they are almost always safe.
      go-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
      # Keep the React + Vite + TypeScript triad pinned together so they land
      # as one PR rather than tripping over each other.
      frontend-framework:
        patterns:
          - react
          - react-dom
          - "@types/react*"
          - "@vitejs/*"
          - vite
          - typescript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Seoul

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
      timezone: Asia/Seoul
